  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="56" y="72" fill="#0f172a" font-size="34" font-weight="700">01 Create Stack Repo</text>
    <text x="56" y="112" fill="#475569" font-size="18">One GitHub repository becomes the source of truth for your agent workspace.</text>
    <rect x="56" y="152" width="236" height="104" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="174" y="194" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">GitHub Repo</text>
    <text x="174" y="226" text-anchor="middle" fill="#334155" font-size="15">AgentWorkOS-Stack</text>
    <rect x="362" y="152" width="236" height="104" rx="16" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>

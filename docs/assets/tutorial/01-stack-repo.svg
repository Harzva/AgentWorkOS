    <rect x="668" y="152" width="236" height="104" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="786" y="194" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Portable</text>

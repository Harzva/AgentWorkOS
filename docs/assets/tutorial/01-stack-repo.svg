<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Step 01 Stack Repo</title>
  <desc id="desc">Create a GitHub repository as the AgentWorkOS stack source.</desc>

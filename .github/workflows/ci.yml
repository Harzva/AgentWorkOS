name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e . -r requirements-docs.txt pytest
      - name: Test
        run: python -m pytest -q
      - name: Validate JSON schemas
        run: |
          python -m json.tool schemas/agentworkos.schema.json > /dev/null
          python -m json.tool schemas/agentpkg.schema.json > /dev/null
          python -m json.tool schemas/agentworkos-lock.schema.json > /dev/null
      - name: AgentWorkOS doctor
        run: aw doctor --manifest agentworkos.toml
      - name: Build docs
        run: python -m mkdocs build --strict
